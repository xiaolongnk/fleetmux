# fleetmux — agent-native tmux config
# Working name "fleetmux" (final name needs deeper clearance — see README).
# One-command install: bash <(curl -fsSL https://raw.githubusercontent.com/xiaolongnk/fleetmux/main/bin/install.sh)
#
# TPM plugins are installed on first launch. Relaunch tmux after running:
#   ~/.tmux/plugins/tpm/bin/install_plugins

# ── plugin manager (TPM) ─────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# resurrect + continuum: auto-save/restore sessions
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# ── sensible defaults ─────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ',xterm-256color:RGB'
set -g history-limit 50000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 0
set -g focus-events on

# ── mouse support ─────────────────────────────────────────────────────────────
# mouse on enables ALL mouse interactions — no prefix key needed:
#   • click a pane      → focus it
#   • click a window    → switch to it
#   • drag pane border  → resize pane
#   • scroll wheel      → enter copy-mode and scroll through scrollback history
# Works in all modern terminals (iTerm2, Alacritty, Ghostty, xterm, WezTerm…).
set -g mouse on

# ── prefix: keep Ctrl-b; uncomment to use Ctrl-a ────────────────────────────
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# ── core keybindings ─────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# Splits that remember the current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── agent-pane jump bindings ─────────────────────────────────────────────────
# Jump to the first pane whose title matches an agent pattern.
# These are configurable: change the grep pattern to match your agent's pane title.
# Agent CLI defaults: Claude Code sets pane title to "claude"; Cursor to "cursor";
# Gemini CLI to "gemini". Adjust the patterns below if yours differ.
bind a run-shell "tmux select-pane -t \$(tmux list-panes -a -F '#{window_index}:#{pane_index} #{pane_title}' | grep -i 'claude\\|claude-code' | head -1 | awk '{print \$1}') 2>/dev/null || true"
bind g run-shell "tmux select-pane -t \$(tmux list-panes -a -F '#{window_index}:#{pane_index} #{pane_title}' | grep -i 'gemini' | head -1 | awk '{print \$1}') 2>/dev/null || true"

# prefix + ? → show fleetmux cheat sheet in a new window
bind ? new-window -n "fleetmux-help" "cat ~/.config/tmux/CHEATSHEET.md 2>/dev/null || echo 'Cheat sheet not found — see https://github.com/xiaolongnk/fleetmux'; read"

# ── first-run guided intro ────────────────────────────────────────────────────
# Displays a Quick Start popup exactly once, when the first-ever tmux session
# is created. Controlled by sentinel: ~/.config/tmux/.firstrun-done
# Delete that file to see the popup again. Runs in background (-b) so session
# creation is never blocked. Requires tmux ≥ 3.2 (display-popup support).
set-hook -g session-created "run-shell -b '~/.config/tmux/scripts/firstrun-popup.sh'"

# ── agent-aware status bar ────────────────────────────────────────────────────
# Pane-title detection: the status bar probes all running pane titles for known
# agent patterns. No daemon required — degrades gracefully if no agents running.
#
# Agent indicator logic (shell fragment evaluated by tmux every interval):
#   - "⬡ Claude" appears if ANY pane title contains "claude" or "claude-code"
#   - "▣ Cursor" appears if ANY pane title contains "cursor"  (case-insensitive)
#   - "◈ Gemini" appears if ANY pane title contains "gemini"
#   - All three are hidden when no agents are detected
#
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour252"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=colour39,bold] #S #[fg=colour235,bg=colour235]"

# Right: agent indicators + clock + host
set -g status-right-length 80
set -g status-right '#(~/.config/tmux/scripts/agent-status.sh 2>/dev/null)#[fg=colour244] %H:%M #[fg=colour252]#h '

# Window list: highlight active
setw -g window-status-format         " #I:#W "
setw -g window-status-current-format "#[fg=colour39,bold] #I:#W #[fg=colour235,bg=colour235]"
setw -g window-status-style          "fg=colour244"
setw -g window-status-current-style  "fg=colour39,bold"

# Pane borders
set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# ── initialize TPM (MUST be last line) ───────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
